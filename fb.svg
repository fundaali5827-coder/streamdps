:root {
  color-scheme: dark;
  --bg: #0b0f17;
  --panel: #121827;
  --line: rgba(255,255,255,.1);
  --text: #f4f7ff;
  --muted: #9fb0d0;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Inter, Arial, sans-serif;
  background: linear-gradient(180deg, #0b0f17, #06080d);
  color: var(--text);
}
.control-root {
  max-width: 900px;
  margin: 0 auto;
  padding: 32px 20px 40px;
}
h1 { margin: 0 0 18px; }
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 16px;
}
label { display:block; margin-bottom: 12px; color: var(--muted); }
.row { display:flex; gap:10px; align-items:center; }
.row.wrap { flex-wrap: wrap; }
input, select, button, a {
  border-radius: 12px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.04);
  color: var(--text);
  padding: 12px 14px;
  text-decoration: none;
  font-size: 14px;
}
input, select { flex: 1; }
button, a { cursor: pointer; }
.hint { margin-top: 10px; color: var(--muted); }
.links a { display:inline-block; }
code { background: rgba(255,255,255,.06); padding: 2px 6px; border-radius: 8px; }
@media (max-width: 720px) { .row { flex-direction: column; align-items: stretch; } }
