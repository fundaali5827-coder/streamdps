<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{margin:0;background:transparent;font-family:Arial;color:#fff;overflow:hidden}
.timer{position:absolute;top:40px;left:50%;transform:translateX(-50%);
font-size:48px;padding:10px 40px;border-radius:25px;
background:rgba(0,0,0,.6);box-shadow:0 0 20px gold}
.container{display:flex;justify-content:center;gap:20px;margin-top:140px}
.card{width:240px;height:340px;border-radius:25px;padding:20px;text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.6);position:relative}
.fb{background:linear-gradient(160deg,#0b3fa0,#071a40)}
.gs{background:linear-gradient(160deg,#c51c0f,#3a0d0a)}
.bjk{background:linear-gradient(160deg,#333,#111)}
.ts{background:linear-gradient(160deg,#7a1c3a,#2a0d1a)}
.score{font-size:90px;margin-top:60px;text-shadow:0 0 20px gold}
.label{font-size:20px;margin-top:10px}
.winner{position:absolute;bottom:80px;width:100%;text-align:center;
font-size:70px;color:gold;text-shadow:0 0 30px orange;display:none}
</style>
</head>
<body>

<div class="timer" id="timer">10:00</div>

<div class="container">
<div class="card fb"><h2>FB</h2><div class="score" id="fb">0</div><div class="label">PUAN</div></div>
<div class="card gs"><h2>GS</h2><div class="score" id="gs">0</div><div class="label">PUAN</div></div>
<div class="card bjk"><h2>BJK</h2><div class="score" id="bjk">0</div><div class="label">PUAN</div></div>
<div class="card ts"><h2>TS</h2><div class="score" id="ts">0</div><div class="label">PUAN</div></div>
</div>

<div class="winner" id="winner">FB KAZANDI!</div>

<script>
let time=600;
setInterval(()=>{
let m=Math.floor(time/60),s=time%60;
document.getElementById("timer").innerText=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;
if(time<=0){
let scores={FB:+fb.innerText,GS:+gs.innerText,BJK:+bjk.innerText,TS:+ts.innerText};
let w=Object.keys(scores).sort((a,b)=>scores[b]-scores[a])[0];
winner.innerText=w+" KAZANDI!";winner.style.display="block";
}
time--;
},1000);
</script>

</body>
</html>
