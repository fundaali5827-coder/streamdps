<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  background:transparent;
  font-family:Arial;
  overflow:hidden;
}

/* TIMER */
.timer{
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 40px;
  font-size:45px;
  border-radius:30px;
  background:rgba(0,0,0,0.6);
  color:#fff;
  box-shadow:0 0 25px gold;
}

/* KART ALANI */
.container{
  display:flex;
  justify-content:center;
  gap:25px;
  margin-top:140px;
}

/* KART */
.card{
  width:260px;
  height:380px;
  border-radius:25px;
  position:relative;
  overflow:hidden;
}

/* PARLAK ÜST ÇİZGİ */
.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:6px;
  background:linear-gradient(to right,transparent,white,transparent);
  opacity:0.8;
}

/* IŞIK EFEKTİ */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 30% 20%,rgba(255,255,255,0.25),transparent 60%);
}

/* RENKLER */
.fb{background:linear-gradient(160deg,#0b3fa0,#020c25);}
.gs{background:linear-gradient(160deg,#c51c0f,#3a0d0a);}
.bjk{background:linear-gradient(160deg,#3a3a3a,#0d0d0d);}
.ts{background:linear-gradient(160deg,#7a1c3a,#2a0d1a);}

/* TAKIM ADI */
.team{
  text-align:center;
  margin-top:20px;
  font-weight:bold;
  color:#fff;
}

/* SKOR */
.score{
  position:absolute;
  top:55%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:95px;
  color:gold;
  text-shadow:
    0 0 15px gold,
    0 0 40px orange,
    0 0 80px yellow;
}

/* PUAN */
.label{
  position:absolute;
  top:72%;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  letter-spacing:2px;
}

/* WINNER */
.winner{
  position:absolute;
  bottom:80px;
  width:100%;
  text-align:center;
  font-size:70px;
  color:gold;
  text-shadow:
    0 0 20px gold,
    0 0 50px orange,
    0 0 100px yellow;
  display:none;
}
</style>

</head>

<body>

<div class="timer" id="timer">10:00</div>

<div class="container">
  <div class="card fb">
    <div class="team">FB</div>
    <div class="score" id="fb">0</div>
    <div class="label">PUAN</div>
  </div>

  <div class="card gs">
    <div class="team">GS</div>
    <div class="score" id="gs">0</div>
    <div class="label">PUAN</div>
  </div>

  <div class="card bjk">
    <div class="team">BJK</div>
    <div class="score" id="bjk">0</div>
    <div class="label">PUAN</div>
  </div>

  <div class="card ts">
    <div class="team">TS</div>
    <div class="score" id="ts">0</div>
    <div class="label">PUAN</div>
  </div>
</div>

<div class="winner" id="winner">FB KAZANDI!</div>

<script>
let time = 600;

setInterval(()=>{
  let m=Math.floor(time/60);
  let s=time%60;

  document.getElementById("timer").innerText =
    (m<10?"0":"")+m+":"+(s<10?"0":"")+s;

  if(time<=0){
    let scores={
      FB:+fb.innerText,
      GS:+gs.innerText,
      BJK:+bjk.innerText,
      TS:+ts.innerText
    };

    let winnerTeam = Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

    document.getElementById("winner").innerText = winnerTeam+" KAZANDI!";
    document.getElementById("winner").style.display="block";
  }

  time--;
},1000);
</script>

</body>
</html>
