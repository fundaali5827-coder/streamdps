<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamDPS Overlay</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="overlay-root">
    <header class="timer-shell">
      <div class="timer-pill">
        <span class="timer-icon">⏳</span>
        <span id="timerText">10:00</span>
      </div>
    </header>

    <section class="teams-grid" id="teamsGrid"></section>

    <div class="winner-overlay hidden" id="winnerOverlay">
      <div class="winner-burst"></div>
      <div class="winner-text" id="winnerName">FB KAZANDI!</div>
    </div>
  </main>

  <audio id="audio-fb" preload="auto" src="/audio/fb.mp3"></audio>
  <audio id="audio-gs" preload="auto" src="/audio/gs.mp3"></audio>
  <audio id="audio-bjk" preload="auto" src="/audio/bjk.mp3"></audio>
  <audio id="audio-ts" preload="auto" src="/audio/ts.mp3"></audio>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
