<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Overlay Pro</title>
  <div class="overlay-bg"></div>
<style>
html,body{
  margin:0; width:100%; height:100%;
  background:transparent !important; overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
}
body::before{
  content:""; position:fixed; inset:0;
  background:
    radial-gradient(circle at 50% 100%, rgba(255,170,30,.18), transparent 30%),
    radial-gradient(circle at 50% 45%, rgba(255,210,80,.06), transparent 38%);
  pointer-events:none;
}
.timer{
  position:absolute; top:34px; left:50%; transform:translateX(-50%);
  min-width:250px; text-align:center;
  padding:14px 36px; border-radius:24px;
  color:#fff; font-size:30px; font-weight:800; letter-spacing:1px;
  background:linear-gradient(180deg, rgba(86,86,94,.95), rgba(59,59,66,.95));
  box-shadow:0 0 22px rgba(255,190,70,.65), inset 0 1px 0 rgba(255,255,255,.16);
}
.board{
  position:absolute; top:132px; left:50%; transform:translateX(-50%);
  width:min(1500px,95vw); display:grid; grid-template-columns:repeat(4,1fr); gap:22px;
}
.card{
  position:relative; height:430px; border-radius:26px; overflow:hidden;
  border:1px solid rgba(255,255,255,.14);
  box-shadow:
    0 20px 45px rgba(0,0,0,.45),
    inset 0 0 20px rgba(255,255,255,.04);
}
.card::before{
  content:""; position:absolute; left:0; right:0; top:0; height:6px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.95), transparent);
}
.card::after{
  content:""; position:absolute; inset:0;
  background:
    radial-gradient(circle at 18% 16%, rgba(255,255,255,.22), transparent 22%),
    radial-gradient(circle at 82% 10%, rgba(255,255,255,.11), transparent 18%),
    linear-gradient(180deg, rgba(255,255,255,.06), transparent 22%, rgba(0,0,0,.15) 55%, rgba(0,0,0,.22));
  pointer-events:none;
}
.fb{ background:linear-gradient(180deg,#1746ba 0%, #0b235a 100%); }
.gs{ background:linear-gradient(180deg,#c8341f 0%, #6c180f 100%); }
.bjk{ background:linear-gradient(180deg,#474a52 0%, #101215 100%); }
.ts{ background:linear-gradient(180deg,#a34b68 0%, #5d2237 100%); }
.logo{
  position:absolute; top:24px; left:50%; transform:translateX(-50%);
  width:96px; height:96px; object-fit:contain;
  filter: drop-shadow(0 0 10px rgba(255,255,255,.22));
}
.team{
  position:absolute; top:128px; left:0; right:0; text-align:center;
  color:#fff; font-size:22px; font-weight:800; letter-spacing:.5px;
  text-shadow:0 2px 10px rgba(0,0,0,.28);
}
.score{
  position:absolute; left:50%; top:57%; transform:translate(-50%,-50%);
  color:#ffd54d; font-size:110px; font-weight:900; line-height:1;
  text-shadow:
    0 0 8px rgba(255,220,110,1),
    0 0 24px rgba(255,191,60,.92),
    0 0 60px rgba(255,145,0,.72);
}
.label{
  position:absolute; left:50%; top:76%; transform:translateX(-50%);
  color:#fff2c1; font-size:17px; font-weight:800; letter-spacing:4px;
  text-shadow:0 0 10px rgba(255,192,67,.48);
}
.winner{
  position:absolute; left:50%; bottom:44px; transform:translateX(-50%);
  min-width:640px; max-width:88vw;
  padding:16px 28px; text-align:center; border-radius:24px;
  font-size:68px; font-weight:900; color:#ffd34a;
  background:linear-gradient(180deg, rgba(45,31,7,.55), rgba(12,12,14,.18));
  border:1px solid rgba(255,224,126,.24);
  box-shadow:0 0 30px rgba(255,162,0,.24), inset 0 0 12px rgba(255,255,255,.05);
  text-shadow:0 0 10px rgba(255,211,74,1),0 0 34px rgba(255,170,0,.82),0 0 70px rgba(255,140,0,.5);
  opacity:0; transition:.3s;
}
.winner.show{ opacity:1; }
@media (max-width:1200px){
  .card{height:360px}
  .logo{width:78px;height:78px}
  .team{top:106px;font-size:19px}
  .score{font-size:86px}
  .label{top:75%}
}
</style>
</head>
