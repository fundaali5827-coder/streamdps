<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Overlay</title>
<style>
html,body{margin:0;background:transparent;font-family:Arial,Helvetica,sans-serif;overflow:hidden}
.timer{position:absolute;top:30px;left:50%;transform:translateX(-50%);background:rgba(30,30,40,.9);color:#fff6d0;padding:12px 28px;border-radius:22px;box-shadow:0 0 18px rgba(255,200,70,.8);font-weight:800}
.wrap{position:absolute;top:130px;left:50%;transform:translateX(-50%);display:flex;gap:24px}
.card{width:260px;height:380px;border-radius:24px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;box-shadow:0 0 28px rgba(0,0,0,.5);overflow:hidden;border:1px solid rgba(255,255,255,.12)}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,transparent,#fff,transparent)}
.card::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.2),transparent 30%);pointer-events:none}
.fb{background:linear-gradient(#0b3c9d,#001a4d)}
.gs{background:linear-gradient(#a00000,#4d0000)}
.bjk{background:linear-gradient(#444,#000)}
.ts{background:linear-gradient(#7a001a,#30000c)}
.logo{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:90px;height:90px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(255,255,255,.4))}
.team{position:absolute;top:120px;font-weight:800}
.score{position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);font-size:90px;color:#ffd700;text-shadow:0 0 20px #ffd700,0 0 40px orange}
.label{position:absolute;top:75%;left:50%;transform:translateX(-50%);letter-spacing:3px}
</style>
</head>
<body>
<div class="timer" id="timer">10:00</div>
<div class="wrap">
  <div class="card fb">
    <img class="logo" src="logos/fb.jpg">
    <div class="team">FB</div>
    <div class="score" id="fb">0</div>
    <div class="label">PUAN</div>
  </div>
  <div class="card gs">
    <img class="logo" src="logos/gs.jpg">
    <div class="team">GS</div>
    <div class="score" id="gs">0</div>
    <div class="label">PUAN</div>
  </div>
  <div class="card bjk">
    <img class="logo" src="logos/bjk.jpg">
    <div class="team">BJK</div>
    <div class="score" id="bjk">0</div>
    <div class="label">PUAN</div>
  </div>
  <div class="card ts">
    <img class="logo" src="logos/ts.jpg">
    <div class="team">TS</div>
    <div class="score" id="ts">0</div>
    <div class="label">PUAN</div>
  </div>
</div>
<script>
let t=600;
setInterval(()=>{
  const m=Math.floor(t/60), s=t%60;
  document.getElementById('timer').textContent =
    String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  if(t>0) t--;
},1000);
</script>
</body>
</html>
