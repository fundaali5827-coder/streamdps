<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Overlay</title>
<script src="/socket.io/socket.io.js"></script>
<style>
:root{
  --gold:#ffd24a;
  --gold2:#ff9900;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:transparent;
  font-family:Arial,Helvetica,sans-serif;
  overflow:hidden;
  color:#fff;
}
.stage{
  width:100vw;height:100vh;position:relative;
  background:
    radial-gradient(circle at center bottom, rgba(255,154,46,.18), transparent 36%),
    radial-gradient(circle at center, rgba(255,213,79,.08), transparent 55%),
    transparent;
}
.top-glow{
  position:absolute;left:50%;top:26px;transform:translateX(-50%);
  width:460px;height:76px;border-radius:28px;
  background:rgba(18,18,24,.62);
  border:1px solid rgba(255,232,161,.32);
  box-shadow:0 0 30px rgba(255,177,57,.28), inset 0 0 18px rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:center;
  font-size:44px;font-weight:800;letter-spacing:2px;text-shadow:0 0 18px rgba(255,184,73,.8);
}
.board{
  position:absolute;left:50%;top:140px;transform:translateX(-50%);
  width:min(1500px,94vw);
  display:grid;grid-template-columns:repeat(4,1fr);gap:24px;
}
.card{
  position:relative;height:460px;border-radius:28px;overflow:hidden;
  box-shadow:
    0 18px 40px rgba(0,0,0,.45),
    0 0 18px rgba(255,255,255,.06),
    inset 0 0 26px rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.13);
  background:
    radial-gradient(circle at 20% 16%, rgba(255,255,255,.26), transparent 22%),
    radial-gradient(circle at 82% 12%, rgba(255,255,255,.10), transparent 18%),
    linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.12) 30%, rgba(0,0,0,.34) 100%);
}
.card::before{
  content:"";position:absolute;left:0;right:0;top:0;height:7px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.95), transparent);
  opacity:.92;
}
.card::after{
  content:"";position:absolute;left:-18%;right:-18%;bottom:-24%;height:44%;
  background:radial-gradient(circle at center, rgba(255,177,43,.18), transparent 55%);
  pointer-events:none;
}
.fb{background-color:#123b8e}
.gs{background-color:#8d2014}
.bjk{background-color:#222227}
.ts{background-color:#66203a}
.logo-wrap{
  position:absolute;left:50%;top:26px;transform:translateX(-50%);
  width:112px;height:112px;border-radius:56px;
  background:rgba(255,255,255,.94);
  box-shadow:0 0 22px rgba(255,255,255,.20), 0 0 16px rgba(255,199,78,.24);
  display:flex;align-items:center;justify-content:center;
}
.logo-wrap img{max-width:80px;max-height:80px;object-fit:contain}
.fallback{
  font-size:34px;font-weight:900;color:#111;display:none;
}
.team{
  position:absolute;top:148px;left:0;right:0;
  text-align:center;font-size:34px;font-weight:800;letter-spacing:1px;
  text-shadow:0 3px 10px rgba(0,0,0,.3);
}
.score{
  position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);
  font-size:128px;font-weight:900;color:var(--gold);
  text-shadow:
    0 0 8px rgba(255,210,74,1),
    0 0 18px rgba(255,184,44,.95),
    0 0 42px rgba(255,142,0,.7),
    0 0 82px rgba(255,142,0,.48);
}
.label{
  position:absolute;left:50%;top:74%;transform:translateX(-50%);
  font-size:32px;font-weight:800;letter-spacing:6px;
  color:#fff7d3;text-shadow:0 0 12px rgba(255,189,58,.6);
}
.winner{
  position:absolute;left:50%;bottom:52px;transform:translateX(-50%);
  min-width:740px;max-width:90vw;padding:22px 34px;border-radius:28px;
  text-align:center;font-size:74px;font-weight:900;
  color:var(--gold);
  background:linear-gradient(180deg, rgba(26,20,7,.62), rgba(10,10,10,.25));
  border:1px solid rgba(255,227,141,.3);
  text-shadow:
    0 0 10px rgba(255,209,71,1),
    0 0 30px rgba(255,174,0,.85),
    0 0 70px rgba(255,149,0,.55);
  box-shadow:0 0 28px rgba(255,160,0,.28), inset 0 0 16px rgba(255,255,255,.05);
  opacity:0;transition:opacity .35s ease, transform .35s ease;
}
.winner.show{opacity:1;transform:translateX(-50%) scale(1.02)}
.feed{
  position:absolute;left:34px;bottom:40px;width:330px;
  display:flex;flex-direction:column;gap:8px;
}
.feed-item{
  padding:10px 14px;border-radius:14px;background:rgba(10,10,18,.55);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(6px);font-size:16px;
}
@media (max-width:1200px){
  .board{gap:14px}
  .card{height:360px}
  .team{top:122px;font-size:24px}
  .score{font-size:92px}
  .label{font-size:22px}
  .logo-wrap{width:88px;height:88px}
  .logo-wrap img{max-width:64px;max-height:64px}
}
</style>
</head>
<body>
<div class="stage">
  <div class="top-glow" id="timer">10:00</div>

  <div class="board">
    <div class="card fb">
      <div class="logo-wrap"><img id="logo-FB" alt=""><div class="fallback" id="fallback-FB">FB</div></div>
      <div class="team">FB</div>
      <div class="score" id="score-FB">0</div>
      <div class="label">PUAN</div>
    </div>
    <div class="card gs">
      <div class="logo-wrap"><img id="logo-GS" alt=""><div class="fallback" id="fallback-GS">GS</div></div>
      <div class="team">GS</div>
      <div class="score" id="score-GS">0</div>
      <div class="label">PUAN</div>
    </div>
    <div class="card bjk">
      <div class="logo-wrap"><img id="logo-BJK" alt=""><div class="fallback" id="fallback-BJK">BJK</div></div>
      <div class="team">BJK</div>
      <div class="score" id="score-BJK">0</div>
      <div class="label">PUAN</div>
    </div>
    <div class="card ts">
      <div class="logo-wrap"><img id="logo-TS" alt=""><div class="fallback" id="fallback-TS">TS</div></div>
      <div class="team">TS</div>
      <div class="score" id="score-TS">0</div>
      <div class="label">PUAN</div>
    </div>
  </div>

  <div class="winner" id="winner"></div>
  <div class="feed" id="feed"></div>

  <audio id="audio-FB" src="/audio/fb.mp3" preload="auto"></audio>
  <audio id="audio-GS" src="/audio/gs.mp3" preload="auto"></audio>
  <audio id="audio-BJK" src="/audio/bjk.mp3" preload="auto"></audio>
  <audio id="audio-TS" src="/audio/ts.mp3" preload="auto"></audio>
</div>

<script>
const socket = io();
const TEAM_IDS = ['FB','GS','BJK','TS'];
const audioEls = {
  FB: document.getElementById('audio-FB'),
  GS: document.getElementById('audio-GS'),
  BJK: document.getElementById('audio-BJK'),
  TS: document.getElementById('audio-TS')
};
const positions = { FB:0, GS:0, BJK:0, TS:0 };
let currentLeader = '';
let audioUnlocked = false;
let currentState = null;

function unlockAudio(){
  if(audioUnlocked) return;
  audioUnlocked = true;
  Object.values(audioEls).forEach(a => {
    a.volume = 0.85;
    a.pause();
  });
  if(currentState) syncAudio(currentState);
}
document.body.addEventListener('click', unlockAudio, { once:true });

function fmt(seconds){
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function setLogo(team, url){
  const img = document.getElementById('logo-' + team);
  const fb = document.getElementById('fallback-' + team);
  if(url){
    img.src = url;
    img.style.display = 'block';
    img.onerror = () => {
      img.style.display = 'none';
      fb.style.display = 'block';
    };
    img.onload = () => {
      fb.style.display = 'none';
    };
  } else {
    img.style.display = 'none';
    fb.style.display = 'block';
  }
}

function pauseAllExcept(exceptTeam){
  TEAM_IDS.forEach(team => {
    if(team !== exceptTeam){
      positions[team] = audioEls[team].currentTime || positions[team] || 0;
      audioEls[team].pause();
    }
  });
}

function syncAudio(state){
  if(!audioUnlocked || !state.audio?.enabled){
    TEAM_IDS.forEach(team => audioEls[team].pause());
    return;
  }
  const leader = state.leader || '';
  if(!leader){
    TEAM_IDS.forEach(team => {
      positions[team] = audioEls[team].currentTime || positions[team] || 0;
      audioEls[team].pause();
    });
    currentLeader = '';
    return;
  }
  if(currentLeader === leader && !audioEls[leader].paused) return;

  pauseAllExcept(leader);
  const a = audioEls[leader];
  try {
    if(Math.abs((a.currentTime || 0) - (positions[leader] || 0)) > 0.3) {
      a.currentTime = positions[leader] || 0;
    }
  } catch(e) {}
  a.loop = true;
  a.play().catch(()=>{});
  currentLeader = leader;
}

TEAM_IDS.forEach(team => {
  audioEls[team].addEventListener('timeupdate', () => {
    positions[team] = audioEls[team].currentTime || 0;
  });
});

socket.on('state', state => {
  currentState = state;
  document.getElementById('timer').textContent = fmt(state.timeLeft || 0);

  TEAM_IDS.forEach(team => {
    document.getElementById('score-' + team).textContent = state.scores?.[team] ?? 0;
    setLogo(team, state.logos?.[team] || '');
  });

  const winner = document.getElementById('winner');
  if(state.showWinner && state.winner){
    winner.textContent = state.winner === 'BERABERE' ? 'BERABERE' : (state.winner + ' KAZANDI!');
    winner.classList.add('show');
  } else {
    winner.classList.remove('show');
  }

  const feed = document.getElementById('feed');
  const items = state.giftFeed || [];
  feed.innerHTML = items.map(x => `<div class="feed-item">${x.message}</div>`).join('');
  syncAudio(state);
});
</script>
</body>
</html>
