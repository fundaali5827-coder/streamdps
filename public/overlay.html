<!DOCTYPE html>
<html>
<body style="margin:0;background:transparent;color:white;text-align:center;font-size:40px">
FB <span id="fb">0</span> |
GS <span id="gs">0</span> |
BJK <span id="bjk">0</span> |
TS <span id="ts">0</span>
<script>
setInterval(async ()=>{
 let d = await fetch('/api/state').then(r=>r.json());
 fb.innerText=d.scores.FB;
 gs.innerText=d.scores.GS;
 bjk.innerText=d.scores.BJK;
 ts.innerText=d.scores.TS;
},1000);
</script>
</body>
</html>
