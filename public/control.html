<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kontrol Paneli</title>
<style>
body{margin:0;background:#0f172a;color:#fff;font-family:Arial,Helvetica,sans-serif}
.wrap{max-width:1050px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.panel{background:#1e293b;border-radius:20px;padding:20px;border:1px solid rgba(255,255,255,.08)}
h1,h2{margin:0 0 12px}
label{display:block;font-size:14px;color:#cbd5e1;margin:10px 0 6px}
input,select,button{width:100%;padding:12px 14px;border-radius:12px;border:none;outline:none;font-size:15px}
input,select{background:#0f172a;color:#fff;border:1px solid #334155}
button{background:#2563eb;color:#fff;font-weight:800;cursor:pointer}
button.secondary{background:#475569}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.status{margin-top:12px;padding:10px 12px;border-radius:12px;background:#0f172a;color:#cbd5e1;min-height:20px}
.scoregrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.scorebox{background:#0f172a;padding:16px;border-radius:14px;text-align:center}
.small{font-size:13px;color:#94a3b8}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <h1>Kontrol Paneli</h1>
    <label>TikTok kullanici adi</label>
    <div class="grid2">
      <input id="username" placeholder="ornek: kullaniciadi">
      <button onclick="connectTikTok()">Baglan</button>
    </div>
    <label>Sure (saniye)</label>
    <div class="grid2">
      <input id="duration" type="number" min="10" value="600">
      <button onclick="saveSettings()">Kaydet</button>
    </div>
    <label>Logo Yollari</label>
    <div class="grid2">
      <input id="logoFB" placeholder="logos/fb.png">
      <input id="logoGS" placeholder="logos/gs.png">
      <input id="logoBJK" placeholder="logos/bjk.png">
      <input id="logoTS" placeholder="logos/ts.png">
    </div>
    <label>Hediye Esleme</label>
    <div class="grid2">
      <input id="gift1" value="rose"><select id="team1"><option>FB</option><option>GS</option><option>BJK</option><option>TS</option></select>
      <input id="gift2" value="tiktok"><select id="team2"><option>FB</option><option selected>GS</option><option>BJK</option><option>TS</option></select>
      <input id="gift3" value="gg"><select id="team3"><option>FB</option><option>GS</option><option selected>BJK</option><option>TS</option></select>
      <input id="gift4" value="ice cream cone"><select id="team4"><option>FB</option><option>GS</option><option>BJK</option><option selected>TS</option></select>
    </div>
    <div class="grid2" style="margin-top:14px">
      <button onclick="startTimer()">Turu Baslat</button>
      <button class="secondary" onclick="stopTimer()">Durdur</button>
      <button class="secondary" onclick="resetTimer()">Sureyi Sifirla</button>
      <button class="secondary" onclick="resetScores()">Puanlari Sifirla</button>
    </div>
    <h2 style="margin-top:18px">Test Puan</h2>
    <div class="grid4">
      <button onclick="addScore('FB')">FB +1</button>
      <button onclick="addScore('GS')">GS +1</button>
      <button onclick="addScore('BJK')">BJK +1</button>
      <button onclick="addScore('TS')">TS +1</button>
    </div>
    <div class="status" id="status">Hazir.</div>
  </div>
  <div class="panel">
    <h2>Canli Durum</h2>
    <div class="small">Overlay: /overlay.html</div>
    <div style="font-size:34px;font-weight:900;margin:12px 0" id="showTime">10:00</div>
    <div class="small" id="showLeader">Lider: yok</div>
    <div class="scoregrid" style="margin-top:14px">
      <div class="scorebox"><div>FB</div><div id="sFB">0</div></div>
      <div class="scorebox"><div>GS</div><div id="sGS">0</div></div>
      <div class="scorebox"><div>BJK</div><div id="sBJK">0</div></div>
      <div class="scorebox"><div>TS</div><div id="sTS">0</div></div>
    </div>
    <h2 style="margin-top:18px">Muzik Dosyalari</h2>
    <div class="small">public/audio/ klasorune koy:</div>
    <ul>
      <li>fb.mp3</li>
      <li>gs.mp3</li>
      <li>bjk.mp3</li>
      <li>ts.mp3</li>
    </ul>
    <div class="small">Overlay'de sese izin icin sayfaya bir kez tikla.</div>
  </div>
</div>
<script>
const API = window.location.origin;
function setStatus(msg){ document.getElementById('status').textContent = msg; }
function fmt(seconds){ const m=Math.floor(seconds/60), s=seconds%60; return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
async function req(url, body){
  const res = await fetch(API + url, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined
  });
  const data = await res.json().catch(() => ({}));
  if(!res.ok) throw new Error(data.error || 'istek basarisiz');
  return data;
}
async function loadState(){
  const res = await fetch(API + '/api/state');
  const d = await res.json();
  document.getElementById('showTime').textContent = fmt(d.timeLeft || 0);
  document.getElementById('showLeader').textContent = 'Lider: ' + (d.leader || 'yok');
  document.getElementById('sFB').textContent = d.scores.FB || 0;
  document.getElementById('sGS').textContent = d.scores.GS || 0;
  document.getElementById('sBJK').textContent = d.scores.BJK || 0;
  document.getElementById('sTS').textContent = d.scores.TS || 0;
  document.getElementById('username').value = d.username || '';
  document.getElementById('duration').value = d.timerDuration || 600;
  document.getElementById('logoFB').value = d.logos?.FB || '';
  document.getElementById('logoGS').value = d.logos?.GS || '';
  document.getElementById('logoBJK').value = d.logos?.BJK || '';
  document.getElementById('logoTS').value = d.logos?.TS || '';
}
async function saveSettings(){
  try{
    await req('/api/settings', {
      username: document.getElementById('username').value.trim(),
      timerDuration: Number(document.getElementById('duration').value || 600),
      logos: {
        FB: document.getElementById('logoFB').value.trim(),
        GS: document.getElementById('logoGS').value.trim(),
        BJK: document.getElementById('logoBJK').value.trim(),
        TS: document.getElementById('logoTS').value.trim()
      }
    });
    await req('/api/gifts', {
      gifts: {
        [document.getElementById('gift1').value.trim()]: document.getElementById('team1').value,
        [document.getElementById('gift2').value.trim()]: document.getElementById('team2').value,
        [document.getElementById('gift3').value.trim()]: document.getElementById('team3').value,
        [document.getElementById('gift4').value.trim()]: document.getElementById('team4').value
      }
    });
    setStatus('Kaydedildi.');
    loadState();
  } catch(e){ setStatus(e.message); }
}
async function startTimer(){ try{ await saveSettings(); await req('/api/timer/start', { duration: Number(document.getElementById('duration').value || 600) }); setStatus('Tur basladi.'); } catch(e){ setStatus(e.message); } }
async function stopTimer(){ try{ await req('/api/timer/stop'); setStatus('Durduruldu.'); } catch(e){ setStatus(e.message); } }
async function resetTimer(){ try{ await req('/api/timer/reset'); setStatus('Sure sifirlandi.'); } catch(e){ setStatus(e.message); } }
async function resetScores(){ try{ await req('/api/scores/reset'); setStatus('Puanlar sifirlandi.'); } catch(e){ setStatus(e.message); } }
async function addScore(team){ try{ await req('/api/scores/add', { team, points: 1 }); setStatus(team + ' +1 eklendi.'); loadState(); } catch(e){ setStatus(e.message); } }
async function connectTikTok(){ try{ await saveSettings(); await req('/api/tiktok/connect', { username: document.getElementById('username').value.trim() }); setStatus('TikTok baglandi.'); } catch(e){ setStatus(e.message); } }
setInterval(loadState, 800);
loadState();
</script>
</body>
</html>
